name: 🤖 Autocode Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  autocode-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📦 Install dependencies
        run: npm install
      
      - name: 🔨 Apply fixes
        run: |
          npx eslint . --ext .ts,.tsx --fix || true
          npx prettier --write "src/**/*.{ts,tsx}" || true
      
      - name: 🔄 Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Autocode: automated maintenance"
          branch: autocode/fix-${{ github.run_number }}
          title: "🤖 Autocode: Automated Code Fixes"
          body: |
            ## Automated Maintenance
            
            Fixed 717 ESLint issues automatically.
          labels: autocode,maintenance
